<!DOCTYPE html>
<html>
<head>
    <title>Certificate Portal</title>

<style>

body{
    margin:0;
    padding:0;

    background-image:url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f');

    background-size:cover;
    background-position:center;

    font-family:Arial;
}

.overlay{
    width:100%;
    height:100vh;

    background:rgba(0,0,0,0.5);

    display:flex;
    justify-content:center;
    align-items:center;
}

.box{

    background:white;
    padding:40px;

    border-radius:15px;

    text-align:center;

    width:350px;

    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    color:#333;
}

input{

    width:90%;
    padding:12px;

    margin-top:20px;

    border-radius:8px;

    border:1px solid gray;

    font-size:16px;
}

button{

    margin-top:20px;

    padding:12px 25px;

    background:#007bff;

    color:white;

    border:none;

    border-radius:8px;

    font-size:16px;

    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="overlay">

<div class="box">

<h1>Certificate Download Portal</h1>

<form action="/download" method="POST">

<input type="text" name="name" placeholder="Enter Your Name">

<br>

<button type="submit">
Download Certificate
</button>

</form>

</div>

</div>

</body>
</html>
